title: "Santhosh Kumar Pilakkat"
description: "Senior Systems Architect — 5G · SDR · IIoT · FPGA · Embedded Systems"
url: "https://pilakkat.mywire.org"
baseurl: ""
theme: jekyll-theme-chirpy
author: "Santhosh Kumar Pilakkat"
email: "pilakkat1964@gmail.com"
github_username: pilakkat1964
linkedin_username: pilakkat

# External sections hosted in separate repositories
blog_url: "https://pilakkat.mywire.org/blog/"
cv_url: "https://pilakkat.mywire.org/cv/"

# Chirpy theme configuration
img_cdn: ""
timezone: Asia/Kolkata
lang: en
avatar: /assets/images/profile.jpg

# Comments (optional)
comments:
  active: null

# Build settings
encoding: utf-8

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-paginate
  - jekyll-sitemap

# Pagination
paginate: 10
paginate_path: /page:num/

# Archives
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: archive
    tag: archive
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

exclude:
  - README.md
  - SITE-DESIGN.md
  - mise.toml
  - AGENTS.md
  - tools/
